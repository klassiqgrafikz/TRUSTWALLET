<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Portal — Trust Wallet Clone</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#0500FF;--green:#48FF91;--black:#1B1B1C;--white:#FFFFFF;--gray:#4A4A4D;--bg:#F4F4F7;--border:#E5E5E5;--red:#FF3B30;--font:'Inter',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--black);line-height:1.5}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:60px;max-width:1200px;margin:0 auto}
.topbar h1{font-size:18px;font-weight:700}
.topbar a{font-size:13px;color:var(--blue);text-decoration:none}
.container{max-width:1000px;margin:0 auto;padding:32px 24px}
.card{background:var(--white);border-radius:16px;padding:28px;margin-bottom:24px;border:1px solid var(--border)}
.card h2{font-size:16px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group.full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);background:var(--white);transition:border-color .2s}
input:focus,select:focus{border-color:var(--blue);outline:none}
.btn{padding:12px 28px;border-radius:50px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:#0020CC}
.btn-danger{background:var(--red);color:var(--white)}
.btn-danger:hover{background:#CC2929}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--black)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:8px 16px;font-size:12px}
.actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.token-inputs{margin-top:12px;padding:16px;background:var(--bg);border-radius:10px}
.token-inputs h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--gray)}
.token-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.token-row label{text-transform:none;letter-spacing:0;font-size:13px;min-width:60px;margin:0}
.token-row input{flex:1}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
td .addr{font-family:monospace;font-size:12px;word-break:break-all}
.status{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status.active{background:#E8FFE8;color:#22C55E}
.empty-state{padding:40px;text-align:center;color:var(--gray);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;color:var(--white);font-size:14px;font-weight:600;z-index:1000;display:none;animation:fadeIn .3s}
.toast.success{background:#22C55E}
.toast.error{background:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  .form-grid{grid-template-columns:1fr}
  .container{padding:20px 16px}
  .card{padding:20px}
  .topbar-inner{padding:0 16px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <h1>Admin Portal</h1>
    <a href="index.html">&larr; Back to Wallet</a>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Add / Edit Balance</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Network</label>
        <select id="networkSelect"></select>
      </div>
      <div class="form-group">
        <label>Wallet Address</label>
        <input id="addressInput" placeholder="0x... or chain address"/>
      </div>
      <div class="form-group full">
        <label>Native Balance</label>
        <input id="balanceInput" type="number" step="any" min="0" placeholder="0.00"/>
      </div>
    </div>
    <div class="token-inputs" id="tokenSection">
      <h3>Token Balances</h3>
      <div id="tokenFields"></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="saveEntry()">Save Balance</button>
      <button class="btn btn-outline" onclick="clearForm()">Clear Form</button>
    </div>
  </div>

  <div class="card">
    <h2>Stored Balances</h2>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Address</th><th>Network</th><th>Native</th><th>Tokens</th><th></th></tr></thead>
        <tbody id="entriesBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state">No admin balances set yet.</div>
    <div class="actions" style="margin-top:12px">
      <button class="btn btn-danger btn-sm" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data/networks.js"></script>
<script src="js/data/price-ids.js"></script>
<script src="js/core/admin-data.js"></script>
<script src="js/admin/app.js"></script>
</body>
</html>
